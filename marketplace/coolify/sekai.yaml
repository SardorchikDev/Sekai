# documentation: https://github.com/sekai-labs/sekai
# slogan: Fast, small, fully autonomous AI personal assistant infrastructure — deploy anywhere, swap anything
# tags: ai, agent, assistant, self-hosted, llm, chatbot, rust
# logo: svgs/sekai.png
# port: 42617

services:
  sekai:
    image: ghcr.io/sekai-labs/sekai:latest
    restart: unless-stopped
    environment:
      - API_KEY=${SERVICE_PASSWORD_APIKEY:-}
      - PROVIDER=${PROVIDER:-openrouter}
      - SEKAI_ALLOW_PUBLIC_BIND=true
      - SEKAI_GATEWAY_PORT=42617
    volumes:
      - sekai-data:/sekai-data
    ports:
      - "42617:42617"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 32M
    healthcheck:
      test: ["CMD", "sekai", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sekai-data:
